# ~/.config/starship.toml

add_newline = false
command_timeout = 800

palette = "gentoo"

format = """
[](gentoo_dark)$os$username$hostname[](fg:gentoo_dark bg:gentoo_mid)$directory[](fg:gentoo_mid) $git_branch$git_status$git_metrics$python$c$rust$haskell$nodejs$nix_shell$custom$cmd_duration$jobs$battery
"""

right_format = """$time"""

[palettes.gentoo]
gentoo_dark = "#54487A"
gentoo_mid = "#6C5B96"
gentoo_dim = "#4D4568"
gentoo_deep = "#3B3552"
gentoo_black = "#211D2E"
gentoo_text = "#F7F7F7"
gentoo_muted = "#D7D1E8"
gentoo_warn = "#EBCB8B"
gentoo_bad = "#BF616A"
gentoo_good = "#A3BE8C"

# --------------------
# Core prompt
# --------------------

[character]
success_symbol = "[❯](bold gentoo_good)"
error_symbol = "[❯](bold gentoo_bad)"

[os]
disabled = false
style = "bold fg:gentoo_text bg:gentoo_dark"
format = "[$symbol]($style)"

[os.symbols]
Arch = ""
Debian = ""
Gentoo = ""
Linux = ""
NixOS = ""
Ubuntu = ""

[username]
show_always = false
style_user = "bold fg:gentoo_text bg:gentoo_dark"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "bold fg:gentoo_text bg:gentoo_dark"
format = "[@$hostname ]($style)"

[directory]
style = "bold fg:gentoo_text bg:gentoo_mid"
truncation_length = 3
truncate_to_repo = true
format = "[ $path ]($style)"

# --------------------
# Git
# --------------------

[git_branch]
symbol = " "
style = "bold gentoo_mid"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold gentoo_warn"
format = "[$all_status$ahead_behind]($style) "

[git_metrics]
disabled = false
added_style = "bold gentoo_good"
deleted_style = "bold gentoo_bad"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

# --------------------
# Languages and project context
# --------------------

[python]
symbol = "py "
style = "bold gentoo_good"
format = "[$symbol$version]($style) "
version_format = "v${raw}"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", "setup.py"]

[c]
symbol = "c "
style = "bold gentoo_muted"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[rust]
symbol = "rs "
style = "bold gentoo_bad"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[haskell]
symbol = "λ "
style = "bold gentoo_mid"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[nodejs]
symbol = "node "
style = "bold gentoo_good"
format = "[$symbol$version]($style) "
version_format = "v${raw}"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[nix_shell]
symbol = "nix "
style = "bold gentoo_muted"
format = "[$symbol$state]($style) "

[custom.cabal]
command = "cabal --numeric-version"
detect_extensions = ["cabal"]
detect_files = ["cabal.project", "cabal.project.local"]
format = "[cabal v$output]($style) "
style = "bold gentoo_mid"

# --------------------
# Runtime signals
# --------------------

[cmd_duration]
min_time = 1000
show_milliseconds = false
style = "bold gentoo_warn"
format = "took [$duration]($style) "

[jobs]
threshold = 1
symbol = "jobs "
style = "bold gentoo_muted"
format = "[$symbol$number]($style) "

[battery]
full_symbol = "bat"
charging_symbol = "chg"
discharging_symbol = "bat"
format = "[$symbol $percentage]($style) "

[[battery.display]]
threshold = 30
style = "bold gentoo_bad"

[[battery.display]]
threshold = 60
style = "bold gentoo_warn"

[time]
disabled = false
time_format = "%H:%M"
style = "bold fg:gentoo_text bg:gentoo_dark"
format = "[](gentoo_dark)[ $time ]($style)[](gentoo_dark) "
