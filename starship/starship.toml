"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

# Two-line Powerline prompt
# Left:  [OS][DIRECTORY][GIT][LANGUAGE] took Xs
# Right: [BATTERY][TIME]
# Line2: prompt character
format = """
[](fg:#9A348E)\
$os\
[](bg:#54487A fg:#9A348E)\
$directory\
[](bg:#FCA17D fg:#54487A)\
$git_branch\
$git_status\
[](bg:#86BBD8 fg:#FCA17D)\
$python$nodejs$rust\
[](fg:#86BBD8)\
$cmd_duration\
$fill\
$battery\
[](bg:#33658A fg:#06969A)\
$time\
[](fg:#33658A)\
$line_break\
$character\
"""

[os]
disabled = false
style = "bg:#9A348E fg:#E0DEF4"
format = "[ $symbol ]($style)"

[os.symbols]
Ubuntu = ""

[directory]
style = "bg:#54487A fg:#E0DEF4"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = false
truncation_symbol = ""
substitutions = { "/" = " ❯ " }
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bg:#FCA17D fg:#1C1917"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:#FCA17D fg:#1C1917"
format = "[$all_status$ahead_behind]($style)"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "≡"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
symbol = " "
style = "bg:#86BBD8 fg:#1C1917"
format = "[ $symbol($virtualenv) ]($style)"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "setup.py"]

[nodejs]
symbol = " "
style = "bg:#86BBD8 fg:#1C1917"
format = "[ $symbol($version) ]($style)"
detect_extensions = ["js", "ts", "mjs"]
detect_files = ["package.json", ".node-version", ".nvmrc"]

[rust]
symbol = " "
style = "bg:#86BBD8 fg:#1C1917"
format = "[ $symbol($version) ]($style)"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

[cmd_duration]
min_time = 500
style = "fg:#86BBD8"
format = " took [$duration]($style)"

[fill]
symbol = " "

[battery]
format = "[ $symbol$percentage ]($style)"
disabled = false

[[battery.display]]
threshold = 20
charging_symbol = "󰂄"
discharging_symbol = "󱃌"
style = "bg:#06969A fg:#E15759"

[[battery.display]]
threshold = 100
charging_symbol = "󰂄"
discharging_symbol = "󰂃"
style = "bg:#06969A fg:#E0DEF4"

[time]
disabled = false
style = "bg:#33658A fg:#E0DEF4"
format = "[ 󱑎 $time ]($style)"
time_format = "%H:%M"

[character]
success_symbol = "[❯](bold fg:#9A348E)"
error_symbol = "[❯](bold fg:#E15759)"

[package]
disabled = true
[hostname]
disabled = true
[username]
disabled = true
